<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상정중 3-1 성적 향상 프로젝트</title>
  
  <!-- React & Babel & Tailwind CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- html2canvas & SheetJS(XLSX) CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  
  <style>
    body { font-family: 'Pretendard', 'Malgun Gothic', sans-serif; }
    /* 프린트 및 이미지 저장 시 스크롤바 숨김 */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React Code Area -->
  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const { useState, useEffect, useRef } = React;

    // Firebase Initialization (선생님의 고유 설정 코드)
    const myFirebaseConfig = {
      apiKey: "AIzaSyB4WVatO8I0UF-26VgxO2fSwGOTlMBl_7M",
      authDomain: "goodluck301-175e3.firebaseapp.com",
      projectId: "goodluck301-175e3",
      storageBucket: "goodluck301-175e3.firebasestorage.app",
      messagingSenderId: "741090437669",
      appId: "1:741090437669:web:cf076250d558ff48996dcc"
    };
    
    // 미리보기(Canvas) 환경과 실제 배포 환경을 구분하여 오류를 방지합니다.
    const isCanvas = typeof __firebase_config !== 'undefined';
    const firebaseConfig = isCanvas ? JSON.parse(__firebase_config) : myFirebaseConfig;
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : "sangjeong-grade-analyzer"; // 웹사이트 고유 ID

    // 아이콘 SVG 컴포넌트
    const Award = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>;
    const Info = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>;
    const Lock = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
    const User = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
    const LogOut = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>;
    const Users = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>;
    const Settings = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
    const ImageIcon = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>;
    const Trash2 = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;

    // 명렬표 및 시험 정보
    const students = [
      "1번 짠낫민", "2번 구본준", "3번 김유림", "4번 김은성", "5번 문서준",
      "6번 민경준", "7번 배진형", "8번 선지후", "9번 신정호", "10번 유태현",
      "11번 조연우", "12번 조재혁", "13번 김라윤", "14번 김태린", "15번 김하은",
      "16번 나하음", "17번 배지원", "18번 안유민", "19번 오소진", "20번 오윤지",
      "21번 이다은", "22번 이한나", "23번 허주영"
    ];

    const exams = [
      "3학년 1학기 1차시험",
      "3학년 1학기 2차시험",
      "3학년 1학기말 성적",
      "3학년 2학기 1차시험",
      "3학년 2학기말 성적"
    ];

    const FIXED_SUBJECTS_SEM1 = [
      { name: "국어", ratio1: 30, ratio2: 30, ratioPerf: 40 },
      { name: "수학", ratio1: 25, ratio2: 25, ratioPerf: 50 },
      { name: "영어", ratio1: 30, ratio2: 30, ratioPerf: 40 },
      { name: "과학", ratio1: 30, ratio2: 30, ratioPerf: 40 },
      { name: "사회", ratio1: 0,  ratio2: 70, ratioPerf: 30 },
      { name: "역사", ratio1: 0,  ratio2: 40, ratioPerf: 60 },
      { name: "도덕", ratio1: 0,  ratio2: 60, ratioPerf: 40 },
      { name: "체육", ratio1: 0,  ratio2: 0,  ratioPerf: 100 },
      { name: "미술", ratio1: 0,  ratio2: 0,  ratioPerf: 100 }
    ];

    const FIXED_SUBJECTS_SEM2 = [
      { name: "국어", ratio1: 30, ratio2: 30, ratioPerf: 40 },
      { name: "수학", ratio1: 30, ratio2: 30, ratioPerf: 40 },
      { name: "영어", ratio1: 30, ratio2: 30, ratioPerf: 40 },
      { name: "과학", ratio1: 30, ratio2: 30, ratioPerf: 40 },
      { name: "사회", ratio1: 30, ratio2: 30, ratioPerf: 40 },
      { name: "역사", ratio1: 30, ratio2: 30, ratioPerf: 40 },
      { name: "도덕", ratio1: 30, ratio2: 30, ratioPerf: 40 },
      { name: "체육", ratio1: 0,  ratio2: 0,  ratioPerf: 100 },
      { name: "미술", ratio1: 0,  ratio2: 0,  ratioPerf: 100 }
    ];

    const calculateGrade = (score) => {
      if (score >= 90) return 'A';
      if (score >= 80) return 'B';
      if (score >= 70) return 'C';
      if (score >= 60) return 'D';
      return 'E';
    };

    // 일반 시험 Row 컴포넌트
    const StandardRow = ({ subject, isFirstExam, isSecondExam, isSem1Exam1, onUpdate, isCapturing }) => {
      const [target, setTarget] = useState(subject.target || "");
      const [prevScore, setPrevScore] = useState(subject.prevScore || ""); 
      const [score, setScore] = useState(subject.score || ""); 
      
      const r1 = subject.ratio1;
      const r2 = subject.ratio2;
      const rp = subject.ratioPerf;

      const [expectedPerf, setExpectedPerf] = useState(subject.expectedPerf !== undefined ? subject.expectedPerf : rp); 

      useEffect(() => {
        setTarget(subject.target || "");
        setPrevScore(subject.prevScore || "");
        setScore(subject.score || "");
        if (subject.expectedPerf !== undefined) setExpectedPerf(subject.expectedPerf);
        else setExpectedPerf(rp);
      }, [subject, rp]);

      const handleBlur = (field, val, setter) => {
        let finalVal = val;
        if (val !== "") finalVal = Math.max(0, Math.min(100, Number(val))); 
        setter(finalVal);
        if (finalVal !== subject[field]) onUpdate(subject.name, field, finalVal);
      };

      const isSkipped = (isFirstExam && r1 === 0) || (isSecondExam && r2 === 0);

      const targetNum = Number(target);
      const scoreNum = Number(score);
      const hasTarget = target !== "" && !isNaN(targetNum);
      const hasScore = score !== "" && !isNaN(scoreNum);

      let diffDisplay = <span className="text-gray-400 font-bold">-</span>;
      if (!isSkipped && hasTarget && hasScore) {
        const diffNum = Math.round((scoreNum - targetNum) * 10) / 10;
        if (diffNum > 0) diffDisplay = <span className="text-red-500 font-bold">+{diffNum}</span>;
        else if (diffNum < 0) diffDisplay = <span className="text-blue-500 font-bold">{diffNum}</span>;
        else diffDisplay = <span className="text-gray-800 font-bold">0</span>;
      }

      const currentGrade = (!isSkipped && hasScore) ? calculateGrade(scoreNum) : "-";

      let firstExamNextGradeMsg = null;
      if (isSem1Exam1) {
        if (isSkipped) {
          firstExamNextGradeMsg = <span className="text-sm text-gray-500">1차시험 미실시 과목</span>;
        } else if (hasScore) {
          if (scoreNum >= 90) {
            firstExamNextGradeMsg = <span className="text-sm text-blue-600">최고 등급 달성! 현재 페이스 유지 요망</span>;
          } else {
            let targetTotal = scoreNum >= 80 ? 90 : scoreNum >= 70 ? 80 : scoreNum >= 60 ? 70 : 60;
            const targetGrade = calculateGrade(targetTotal);
            const currentAcquired = scoreNum * (r1 / 100);
            const pointsNeeded = targetTotal - currentAcquired;
            const perfAcquired = expectedPerf; 
            const neededFrom2nd = pointsNeeded - perfAcquired; 
            
            let msgContent = "";
            if (r2 === 0) {
              if (pointsNeeded > rp) msgContent = `${targetGrade}등급 달성 불가 (수행 부족)`;
              else msgContent = `${targetGrade}등급 위해 수행 ${Math.ceil(pointsNeeded)}점 이상 필요`;
            } else {
              if (neededFrom2nd <= 0) {
                msgContent = `${targetGrade}등급 위해 2차 0점 이상 필요`;
              } else {
                const required2ndScore = neededFrom2nd / (r2 / 100);
                if (required2ndScore > 100) {
                  msgContent = `${targetGrade}등급 위해 2차 100점 맞아도 부족`;
                } else {
                  msgContent = `${targetGrade}등급 위해 2차 ${Math.ceil(required2ndScore)}점 필요`;
                }
              }
            }

            firstExamNextGradeMsg = (
              <div className="flex flex-col items-center justify-center gap-2 py-1">
                <div className="flex items-center gap-1 text-xs text-yellow-800 font-semibold bg-yellow-100/60 px-2 py-1.5 rounded shadow-sm border border-yellow-200">
                  수행 예상: 
                  {!isCapturing ? (
                    <select value={expectedPerf} onChange={(e) => { const val = Number(e.target.value); setExpectedPerf(val); onUpdate(subject.name, 'expectedPerf', val); }} className="rounded outline-none bg-white text-yellow-900 font-bold px-1 cursor-pointer hover:bg-gray-50">
                      {Array.from({ length: rp + 1 }, (_, i) => rp - i).map(num => <option key={num} value={num}>{num}점</option>)}
                    </select>
                  ) : (
                    <span className="font-bold px-1">{expectedPerf}점</span>
                  )}
                </div>
                <div className="font-bold text-yellow-900 text-[13px]">{msgContent}</div>
              </div>
            );
          }
        } else {
          firstExamNextGradeMsg = <span className="text-xs text-gray-400">점수를 입력하세요</span>;
        }
      }

      return (
        <tr className={`border-b border-gray-100 ${isSkipped ? 'bg-gray-100/50' : 'hover:bg-gray-50'}`}>
          <td className="p-3 font-bold text-gray-800 text-center bg-gray-50 border-r border-gray-100">
            {subject.name}
          </td>
          {isSecondExam && (
            <td className={`p-2 border-r border-gray-100 ${r1 === 0 ? 'bg-gray-100/50' : ''}`}>
              {isSkipped || r1 === 0 ? <div className="text-center text-gray-400 text-sm font-bold">미실시</div> : (
                <div className="flex justify-center items-center">
                  {!isCapturing ? (
                    <input type="number" value={prevScore} onChange={(e) => setPrevScore(e.target.value)} onBlur={() => handleBlur('prevScore', prevScore, setPrevScore)} placeholder="1차점수" className="w-16 px-2 py-1 text-center border border-transparent focus:border-emerald-500 rounded bg-transparent font-bold text-gray-700 outline-none leading-normal" />
                  ) : (
                    <div className="w-16 px-2 py-1 text-center font-bold text-gray-700 leading-normal">{prevScore !== "" ? prevScore : "-"}</div>
                  )}
                </div>
              )}
            </td>
          )}
          <td className="p-2 border-r border-gray-100">
            {isSkipped ? <div className="text-center text-gray-400 text-sm">-</div> : (
              <div className="flex justify-center items-center">
                {!isCapturing ? (
                  <input type="number" min="0" max="100" value={target} onChange={(e) => setTarget(e.target.value)} onBlur={() => handleBlur('target', target, setTarget)} placeholder="목표" className="w-16 px-2 py-1 text-center border border-transparent focus:border-emerald-500 rounded bg-white font-bold text-emerald-700 outline-none shadow-sm leading-normal" />
                ) : (
                  <div className="w-16 px-2 py-1 text-center bg-white rounded shadow-sm font-bold text-emerald-700 leading-normal">{target !== "" ? target : "-"}</div>
                )}
              </div>
            )}
          </td>
          <td className="p-2 border-r border-gray-100">
            {isSkipped ? <div className="text-center text-gray-400 text-sm font-bold">미실시</div> : (
              <div className="flex justify-center items-center">
                {!isCapturing ? (
                  <input type="number" min="0" max="100" value={score} onChange={(e) => setScore(e.target.value)} onBlur={() => handleBlur('score', score, setScore)} placeholder="획득" className="w-16 px-2 py-1 text-center border border-transparent focus:border-emerald-500 rounded bg-white font-bold outline-none shadow-sm leading-normal" />
                ) : (
                  <div className="w-16 px-2 py-1 text-center bg-white rounded shadow-sm font-bold leading-normal">{score !== "" ? score : "-"}</div>
                )}
              </div>
            )}
          </td>
          <td className="p-2 text-center text-lg">{diffDisplay}</td>
          <td className="p-2 text-center border-r border-gray-100">
            <span className={`inline-block w-8 h-8 leading-8 rounded-full font-bold ${currentGrade === 'A' ? 'bg-blue-100 text-blue-700' : currentGrade === 'B' ? 'bg-green-100 text-green-700' : currentGrade === 'C' ? 'bg-yellow-100 text-yellow-700' : currentGrade === 'D' ? 'bg-orange-100 text-orange-700' : currentGrade === 'E' ? 'bg-red-100 text-red-700' : 'bg-gray-100 text-gray-400'}`}>
              {currentGrade}
            </span>
          </td>
          {isSem1Exam1 && (
            <td className="p-2 text-center align-middle bg-yellow-50">{firstExamNextGradeMsg}</td>
          )}
        </tr>
      );
    };

    // 학기말 시험 Row 컴포넌트
    const SemesterRow = ({ subject, onUpdate, isCapturing }) => {
      const updateField = (field, val) => onUpdate(subject.name, field, val);

      const r1 = subject.ratio1;
      const r2 = subject.ratio2;
      const rp = subject.ratioPerf;
      
      const s1 = subject.score1 !== undefined && subject.score1 !== "" ? Number(subject.score1) : null;
      const s2 = subject.score2 !== undefined && subject.score2 !== "" ? Number(subject.score2) : null;
      const sp = subject.scorePerf !== undefined && subject.scorePerf !== "" ? Number(subject.scorePerf) : null;

      const hasAnyScore = s1 !== null || s2 !== null || sp !== null;
      const safeS1 = Math.max(0, Math.min(100, s1 || 0));
      const safeS2 = Math.max(0, Math.min(100, s2 || 0));
      const safeSp = Math.max(0, Math.min(rp, sp || 0));

      const totalScore = hasAnyScore ? ((safeS1 * (r1/100)) + (safeS2 * (r2/100)) + safeSp) : 0;
      const currentGrade = hasAnyScore ? calculateGrade(totalScore) : "-";

      const handleBlur = (field, maxVal, currentVal) => {
        if (currentVal !== "" && currentVal !== null && currentVal !== undefined) {
           const clamped = Math.max(0, Math.min(maxVal, Number(currentVal)));
           if (clamped !== Number(currentVal)) updateField(field, clamped);
        }
      };

      return (
        <tr className="border-b border-gray-100 hover:bg-gray-50">
          <td className="p-3 font-bold text-gray-800 text-center bg-purple-50 border-r border-gray-100">{subject.name}</td>
          <td className="p-2 border-r border-gray-100 bg-white">
            <div className="flex justify-center items-center gap-1 font-semibold text-gray-600">
              <span className={r1 === 0 ? "text-gray-300" : "text-purple-700"}>{r1}</span> : 
              <span className={r2 === 0 ? "text-gray-300" : "text-purple-700"}>{r2}</span> : 
              <span className={rp === 0 ? "text-gray-300" : "text-purple-700"}>{rp}</span>
            </div>
          </td>
          <td className="p-2 border-r border-gray-100 bg-white">
             <div className="flex justify-center items-center gap-2">
              {!isCapturing ? (
                <>
                  <input type="number" disabled={r1 === 0} value={subject.score1||""} onChange={e=>updateField('score1', e.target.value)} onBlur={()=>handleBlur('score1', 100, subject.score1)} placeholder={r1 === 0 ? "-" : "1차"} className="w-14 px-1 py-1 text-center border border-gray-200 rounded focus:border-purple-500 font-semibold outline-none disabled:bg-gray-100 disabled:placeholder-gray-400 leading-normal"/>
                  <input type="number" disabled={r2 === 0} value={subject.score2||""} onChange={e=>updateField('score2', e.target.value)} onBlur={()=>handleBlur('score2', 100, subject.score2)} placeholder={r2 === 0 ? "-" : "2차"} className="w-14 px-1 py-1 text-center border border-gray-200 rounded focus:border-purple-500 font-semibold outline-none disabled:bg-gray-100 disabled:placeholder-gray-400 leading-normal"/>
                  <input type="number" disabled={rp === 0} value={subject.scorePerf||""} onChange={e=>updateField('scorePerf', e.target.value)} onBlur={()=>handleBlur('scorePerf', rp, subject.scorePerf)} placeholder={rp === 0 ? "-" : "수행"} className="w-14 px-1 py-1 text-center border border-gray-200 rounded focus:border-purple-500 font-semibold outline-none disabled:bg-gray-100 disabled:placeholder-gray-400 leading-normal" title={`만점: ${rp}점`}/>
                </>
              ) : (
                <>
                  <div className={`w-14 px-1 py-1 text-center rounded font-semibold ${r1===0 ? 'bg-gray-100 text-gray-400' : 'border border-gray-200 bg-white text-gray-800'}`}>{r1 === 0 ? "-" : (subject.score1 !== undefined && subject.score1 !== "" ? subject.score1 : "")}</div>
                  <div className={`w-14 px-1 py-1 text-center rounded font-semibold ${r2===0 ? 'bg-gray-100 text-gray-400' : 'border border-gray-200 bg-white text-gray-800'}`}>{r2 === 0 ? "-" : (subject.score2 !== undefined && subject.score2 !== "" ? subject.score2 : "")}</div>
                  <div className={`w-14 px-1 py-1 text-center rounded font-semibold ${rp===0 ? 'bg-gray-100 text-gray-400' : 'border border-gray-200 bg-white text-gray-800'}`}>{rp === 0 ? "-" : (subject.scorePerf !== undefined && subject.scorePerf !== "" ? subject.scorePerf : "")}</div>
                </>
              )}
            </div>

                        {mergedSubjects.map((subject) => isSemesterFinal ? 
                          <SemesterRow key={subject.id} subject={subject} onUpdate={handleSubjectChange} isCapturing={isCapturing} /> : 
                          <StandardRow key={subject.id} subject={subject} isFirstExam={isFirstExam} isSecondExam={isSecondExam} isSem1Exam1={isSem1Exam1} onUpdate={handleSubjectChange} isCapturing={isCapturing} />
                        )}
                      </tbody>
                    </table>
                  </div>
                </section>

                {!isSemesterFinal && (
                  <section>
                    <h2 className="text-xl font-bold text-emerald-800 mb-4 flex items-center gap-2"><PenTool className="w-6 h-6" /> 나의 다짐</h2>
                    <ResolutionArea resolution={activeResolution} onUpdate={(val) => updateStudentData(activeStudent, selectedExam, 'resolution', val)} isCapturing={isCapturing} />
                  </section>
                )}

                {isSemesterFinal && isAllSemesterScoresEntered && (
                  <div className="bg-emerald-50 p-5 rounded-xl mt-6 border border-emerald-200 shadow-md">
                    <p className="font-bold text-emerald-900 mb-1 flex items-center gap-2"><Info className="w-5 h-5"/> 아름샘의 한마디:</p>
                    {selectedExam === "3학년 1학기말 성적" ? (
                      <p className="text-emerald-800 text-lg">"1학기 동안 정말 고생 많았어! 부족했던 점은 방학 동안 보완하고, 2학기에는 더 높이 날아오를 너희를 기대할게. 화이팅! 🚀"</p>
                    ) : (
                      <p className="text-emerald-800 text-lg">"중학교 3학년, 1년 동안 정말 고생 많았어! 너희들의 새로운 시작과 빛나는 고등학교 생활을 언제나 응원할게. 졸업 축하해! 🎓✨"</p>
                    )}
                  </div>
                )}
              </div>
            </div>

            {!isCapturing && (
              <div className="pt-6 flex justify-center gap-4">
                 <button onClick={handleDownloadImage} className={`inline-flex items-center gap-2 text-white px-8 py-4 rounded-full font-bold text-lg transition shadow-lg ${isSemesterFinal ? 'bg-purple-700 hover:bg-purple-800' : 'bg-gray-800 hover:bg-gray-900'}`}>
                   <ImageIcon className="w-6 h-6" /> 이미지로 저장
                 </button>
              </div>
            )}

          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
